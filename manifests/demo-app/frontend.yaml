apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: curlimages/curl:latest
        command: ["sleep", "infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cilium-demo
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
